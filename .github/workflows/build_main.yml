name: Build project

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17','21']
    steps:
      - name: Checkout last state of main
        uses: actions/checkout@v4
        with:
          ref: 'main'
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: "maven"
      - name: Build with Maven
        run: mvn clean install -U -Pcoverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sonar
        if: matrix.java == '21'
        run: >
          mvn -B sonar:sonar
          -Dsonar.organization=cx-box
          -Dsonar.projectKey=CX-Box_cxbox-demo
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=$SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
